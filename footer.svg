<svg width="1200" height="160" viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <filter id="footGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="160" fill="url(#footGrad)"/>

  <g fill="none" stroke="#e6fffb" stroke-width="1" opacity="0.25">
    <path d="M0,30 H260 L285,55 H520">
      <animate attributeName="stroke-dasharray" values="0,700;700,0" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M1200,130 H940 L915,105 H680">
      <animate attributeName="stroke-dasharray" values="0,700;700,0" dur="4.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="600" y="78" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="600" fill="#f0fdfa" filter="url(#footGlow)" letter-spacing="2">
    Thanks for stopping by
  </text>
  <text x="600" y="108" text-anchor="middle" font-family="'Fira Code', monospace" font-size="14" fill="#0a0f1c">
    &gt; keep building_
  </text>
</svg>
